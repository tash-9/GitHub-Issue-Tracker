<!DOCTYPE html>
<html lang="en" class="font-text">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-purple': '#5811FF',
            'open-green': '#22C55E',
            'closed-purple': '#A855F7'
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="style.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow-y: auto;
      background-color: #f8fafc;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
  </style>
</head>
<body>

  <!-- LOGIN SECTION  -->
  <div id="login-section" class="bg-white px-8 py-6 rounded-2xl shadow-xl shadow-gray-200/50 w-full max-w-[440px] border border-gray-100 flex flex-col">
    <div class="flex flex-col items-center mb-4">
      <h1 class="text-xl font-bold text-gray-800 mt-2 tracking-tight">GitHub Issues Tracker</h1>
      <p class="text-gray-400 text-[11px]">Sign in to manage your issues</p>
    </div>

    <div class="space-y-3">
      <div>
        <img src="assets/github-logo.png" alt="GitHub Issues Tracker Logo" class="mx-auto w-16 h-16 mb-3">
        <label class="block text-[11px] font-semibold text-gray-700 mb-1">Username</label>
        <input type="text" id="username" placeholder="Enter Username"
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-purple/10 focus:border-brand-purple transition-all text-sm"/>
        <p class="text-[10px] text-brand-purple mt-1 font-medium">Default: admin</p>
      </div>
      <div>
        <label class="block text-[11px] font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" id="password" placeholder="Enter Password"
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-purple/10 focus:border-brand-purple transition-all text-sm"/>
        <p class="text-[10px] text-brand-purple mt-1 font-medium">Default: admin123</p>
      </div>
      <button id="login-btn"
              class="w-full bg-brand-purple text-white py-3 rounded-xl font-bold text-sm hover:opacity-95 active:scale-[0.98] shadow-md mt-1">
        Sign In
      </button>
    </div>
  </div>

  <!-- hidden DASHBOARD SECTION -->
  <div id="dashboard-section" class="hidden w-full max-w-[1440px] p-4 md:p-6 bg-gray-50 min-h-screen">

    <!-- Navbar / Search -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
      <div class="flex items-center gap-3">
        <img src="assets/github-logo.png" alt="Logo" class="w-9 h-9">
        <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
      </div>
      <div class="flex gap-2 w-full md:w-auto">
        <input id="search-input" type="text" placeholder="Search issues..."
               class="input input-bordered w-full sm:w-[280px] rounded-lg text-sm focus:border-brand-purple"/>
        <button id="search-btn" class="btn bg-brand-purple text-white border-none hover:opacity-90 px-6 py-3 text-sm font-bold"> Search </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex flex-wrap gap-2 mb-4">

<button onclick="filterIssues('all')" 
class="tab-btn btn bg-brand-purple text-white hover:bg-yellow-400 hover:text-black px-6 py-3 text-sm font-bold active">
All
</button>

<button onclick="filterIssues('open')" 
class="tab-btn btn bg-brand-purple text-white hover:bg-yellow-400 hover:text-black px-6 py-3 text-sm font-bold">
Open
</button>

<button onclick="filterIssues('closed')" 
class="tab-btn btn bg-brand-purple text-white hover:bg-yellow-400 hover:text-black px-6 py-3 text-sm font-bold">
Closed
</button>

<div id="issue-count-bar" class="flex items-center justify-between bg-white border border-gray-200 rounded-lg px-4 py-3 mb-5 text-sm">
  <div class="flex items-center gap-2 text-gray-700 font-semibold">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="total-count">0</span>
    <span class="text-gray-500 font-normal">issues found</span>
  </div>
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-1.5">
      <span class="inline-block w-3 h-3 rounded-full bg-open-green"></span>
      <span id="open-count" class="font-semibold text-gray-700">0</span>
      <span class="text-gray-400">Open</span>
    </div>
    <div class="flex items-center gap-1.5">
      <span class="inline-block w-3 h-3 rounded-full bg-closed-purple"></span>
      <span id="closed-count" class="font-semibold text-gray-700">0</span>
      <span class="text-gray-400">Closed</span>
    </div>
  </div>
</div>

</div>
<!-- Issue Cards Container -->
 <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <div id="issue-modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-50"></div>

  <script src="script/api.js"></script>
  <script src="script/dashboard.js"></script>
  <script src="script/login.js"></script>
</body>
</html>
